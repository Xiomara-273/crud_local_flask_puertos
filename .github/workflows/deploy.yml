name: tarea3.0

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Xiomara-273
          password: ${{ secrets.XM_TOKEN }}

      - name: Verificar login
        run: |
          docker info

      - name: Construir imagen Docker
        run: |
          docker build -t ghcr.io/${{ xiomara-273 }}/app-landing:3.0.0 .

      - name: Publicar imagen en GHCR
        if: github.event_name == 'push'
        run: |
          docker push ghcr.io/${{ xiomara-273 }}/app-landing:3.0.0

      - name: Probar conexión SSH
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "Conexión SSH exitosa"
            touch ejemplo.txt

      - name: Copiar archivos al servidor
        if: github.event_name == 'push'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          source: "stack.yml,Makefile"
          target: "/home/${{ secrets.VPS_USER }}/quintob"

      - name: Desplegar servicios
        if: github.event_name == 'push'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            echo "Desplegando servicios..."
            cd ~/quintob
            docker pull ghcr.io/${{ xiomara-273}}/app-landing:3.0.0
            docker stack deploy -c stack.yml borrar